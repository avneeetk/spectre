server {
    listen 80;
    server_name api.example.com;

    location /api/v1/users {
        proxy_pass http://user-service:8000;
        auth_jwt "User API";
    }

    location /api/v1/payments {
        proxy_pass http://payment-service:8001;
        auth_basic "Payment API";
    }

    location /api/v1/products {
        proxy_pass http://product-service:8002;
    }

    location /internal/debug/logs {
        proxy_pass http://debug-service:9000;
    }

    location /health {
        return 200 "ok";
    }
}

"""
