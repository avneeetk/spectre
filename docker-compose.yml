services:

  scanner:
    build: ./Neeraj
    ports:
      - "8001:8001"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./Neeraj/test_files:/app/test_files
      - ./Neeraj/output:/app/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent:
    build: ./Harjot
    ports:
      - "8002:8002"
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  classifier:
    build: ./Gurleen
    ports:
      - "8003:8003"
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./Avneet/backend
    ports:
      - "8000:8000"
    volumes:
      - ./Avneet/backend/data:/app/data
    depends_on:
      scanner:
        condition: service_healthy
      agent:
        condition: service_healthy
      classifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./Avneet/frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
